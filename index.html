<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zara Sophia - Videos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;color:#1a1a1a;padding-top:65px}

.navbar{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,0,0,.05);z-index:1000;padding:0 28px;height:65px;display:flex;align-items:center;gap:16px}
.navbar .logo{font-size:20px;font-weight:800;color:#1a1a1a;display:flex;align-items:center;gap:8px;text-decoration:none}
.navbar .logo i{color:#e53935;font-size:22px}
.navbar .profile-badge{display:flex;align-items:center;gap:10px;margin-left:auto;background:#f5f5f5;padding:6px 16px 6px 10px;border-radius:24px;font-size:13px;font-weight:500}
.navbar .profile-badge img{width:30px;height:30px;border-radius:50%;object-fit:cover}

.container{max-width:1200px;margin:0 auto;padding:0 28px}

.profile-header{text-align:center;padding:36px 20px 24px;border-bottom:1px solid rgba(0,0,0,.04)}
.profile-header .avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #e53935;padding:3px;margin-bottom:12px}
.profile-header h1{font-size:22px;font-weight:700;margin-bottom:6px}
.profile-header p{color:#888;font-size:14px;margin-bottom:10px}
.profile-header .stats{display:flex;justify-content:center;gap:30px;margin-top:14px;font-size:13px}
.profile-header .stats span{color:#888}
.profile-header .stats strong{color:#1a1a1a;display:block;font-size:16px;margin-bottom:2px}
.profile-header .refresh-btn{padding:8px 22px;background:#e53935;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:.3s;margin-top:12px;font-family:inherit}
.profile-header .refresh-btn:hover{background:#c62828;transform:translateY(-2px);box-shadow:0 4px 14px rgba(229,57,53,.3)}
.profile-header .refresh-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.featured{padding:24px 0}
.section-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title i{color:#e53935}
.section-title .count{color:#aaa;font-weight:400;font-size:14px}

.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.video-card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.25,.46,.45,.94)}
.video-card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.08);border-color:transparent}
.thumb{width:100%;aspect-ratio:16/9;background-size:cover;background-position:center;position:relative}
.thumb .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;opacity:0;transition:.4s}
.video-card:hover .play-overlay{opacity:1}
.play-circle{width:50px;height:50px;background:#e53935;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(229,57,53,.35);transition:.3s}
.play-circle i{color:#fff;font-size:17px;margin-left:2px}
.info{padding:12px}
.info h3{font-size:13px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;color:#1a1a1a}
.meta{display:flex;align-items:center;gap:12px;margin-top:6px;font-size:12px;color:#999;flex-wrap:wrap}

.watch-page{display:none}
.watch-page.active{display:block}
.video-player-wrap{background:#000;width:100%;position:relative}
.video-player-wrap video{width:100%;max-height:80vh;display:block;margin:0 auto;background:#000}
.player-bottom{max-width:1000px;margin:0 auto;padding:20px 28px}
.video-details h1{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px;line-height:1.4}
.video-details .meta-row{display:flex;gap:16px;font-size:13px;color:#888;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid #eee;margin-bottom:14px}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;background:#f5f5f5;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:.3s;color:#555;margin-bottom:12px;font-family:inherit}
.back-btn:hover{background:#e53935;color:#fff}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:12px}
.related-card{background:#fff;border:1px solid rgba(0,0,0,.05);border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s}
.related-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.06)}
.related-card .thumb{aspect-ratio:16/9;background-size:cover;background-position:center}
.related-card .info{padding:8px}
.related-card .info h3{font-size:12px;font-weight:500}

.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:3000}
.loading-screen.active{display:flex}
.loading-screen p{color:#666;font-size:14px;margin-top:12px}
.spinner{width:44px;height:44px;border:3px solid #eee;border-top-color:#e53935;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:#999}
.empty-state i{font-size:48px;color:#ddd;margin-bottom:14px;display:block}
.empty-state h3{color:#666;font-weight:600;margin-bottom:6px}

@media(max-width:768px){
  body{padding-top:60px}
  .navbar{padding:0 16px;height:60px}
  .container{padding:0 16px}
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .profile-header .avatar{width:60px;height:60px}
  .profile-header h1{font-size:18px}
  .related-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar">
  <a href="#" class="logo" onclick="showHome()"><i class="fas fa-play-circle"></i> <span>Zara Sophia</span></a>
  <div class="profile-badge" id="profileBadge">
    <img src="https://via.placeholder.com/30" alt="" id="navAvatar">
    <span id="navName">@zaraso_phia</span>
  </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main class="container">

  <!-- PROFILE HEADER -->
  <div class="profile-header" id="profileHeader">
    <img src="https://via.placeholder.com/80" alt="" class="avatar" id="avatar">
    <h1 id="fullName">zaraso_phia</h1>
    <p id="bio"><i class="fab fa-instagram" style="color:#e4405f"></i> Instagram Videos</p>
    <div class="stats">
      <div><strong id="videoCount">0</strong><span>Videos</span></div>
      <div><strong id="totalViews">0</strong><span>Total Views</span></div>
    </div>
    <button class="refresh-btn" onclick="fetchFeed()" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
  </div>

  <!-- HOME PAGE -->
  <div id="homePage">
    <section class="featured">
      <div class="section-title">
        <i class="fas fa-video"></i> All Videos <span class="count" id="videoCountLabel"></span>
      </div>
      <div class="video-grid" id="videoGrid">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <h3>Loading videos...</h3>
          <p id="loadStatus">Fetching from Instagram</p>
        </div>
      </div>
    </section>
  </div>

</main>

<!-- ═══ WATCH PAGE ═══ -->
<div class="watch-page" id="watchPage">
  <div class="video-player-wrap">
    <video id="player" controls autoplay playsinline></video>
  </div>
  <div class="player-bottom">
    <button class="back-btn" onclick="closeWatch()"><i class="fas fa-arrow-left"></i> Back</button>
    <div class="video-details">
      <h1 id="watchTitle">Video Title</h1>
      <div class="meta-row" id="watchMeta"></div>
      <h4 style="font-size:15px;font-weight:600;margin-bottom:10px;color:#1a1a1a">More Videos</h4>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </div>
</div>

<!-- ═══ LOADING ═══ -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p id="loadingText">Loading...</p>
</div>

<script>
// ═════════════════════════════════════════════════════════
// ⚡ শুধু GitHub Pages — কোনো সার্ভার/Worker লাগবে না
// ═════════════════════════════════════════════════════════
const INSTAGRAM_USERNAME = 'zaraso_phia';

// ═══ State ═══
let posts = [];      // সব পোস্ট (ভিডিও+ছবি)
let videos = [];      // শুধু ভিডিও
let currentVideoId = null;

// ═══ Init ═══
document.addEventListener('DOMContentLoaded', () => {
  // Check if we have saved data
  const saved = localStorage.getItem('zaraso_feed');
  if(saved) {
    try {
      const data = JSON.parse(saved);
      if(data.videos && data.videos.length > 0) {
        videos = data.videos;
        posts = data.posts || [];
        renderProfile();
        renderGrid(videos);
      }
    } catch(e) {}
  }
  
  // Always try to fetch fresh data
  fetchFeed();
});

// ═══════════════════════════════════════════════
// 🔥 মূল ফাংশন: ইনস্টাগ্রাম ফিড ফেচ করা
// ═══════════════════════════════════════════════
async function fetchFeed() {
  showLoading('Connecting to Instagram...');
  document.getElementById('refreshBtn').disabled = true;
  document.getElementById('loadStatus').textContent = 'Fetching posts...';
  
  try {
    // Step 1: Get profile page HTML — Instagram এর পাবলিক পেজ
    const profileUrl = `https://www.instagram.com/${INSTAGRAM_USERNAME}/`;
    
    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(profileUrl)}`, {
      headers: { 'Accept': 'application/json' }
    });
    
    if(!response.ok) {
      throw new Error('Failed to fetch profile (HTTP ' + response.status + ')');
    }
    
    const data = await response.json();
    const html = data.contents || '';
    
    if(!html || html.length < 100) {
      throw new Error('Empty response from Instagram');
    }
    
    document.getElementById('loadStatus').textContent = 'Parsing posts...';
    
    // Step 2: Extract JSON data from Instagram page
    let jsonData = null;
    
    // Try window.__INITIAL_STATE__ first
    const stateMatch = html.match(/window\.__INITIAL_STATE__\s*=\s*({.+?});/);
    if(stateMatch) {
      try {
        jsonData = JSON.parse(stateMatch[1]);
      } catch(e) {}
    }
    
    // Try __NEXT_DATA__ (newer Instagram)
    if(!jsonData) {
      const nextMatch = html.match(/<script id="__NEXT_DATA__"[^>]*>([^<]+)<\/script>/);
      if(nextMatch) {
        try {
          jsonData = JSON.parse(nextMatch[1]);
        } catch(e) {}
      }
    }
    
    // Fallback: Try to find media data in scripts
    if(!jsonData) {
      const scriptMatches = html.match(/<script[^>]*>window\._sharedData\s*=\s*({.+?});<\/script>/);
      if(scriptMatches) {
        try {
          jsonData = JSON.parse(scriptMatches[1]);
        } catch(e) {}
      }
    }
    
    if(!jsonData) {
      throw new Error('Could not parse Instagram data. The site structure may have changed.');
    }
    
    // Step 3: Extract post shortcodes from the data
    let shortcodes = [];
    
    // Try different possible data structures
    const extractFrom = (obj) => {
      if(!obj) return;
      
      // Common paths
      const paths = [
        'entry_data.ProfilePage[0].graphql.user.edge_owner_to_timeline_media.edges',
        'props.pageProps.user.edge_owner_to_timeline_media.edges',
        'props.pageProps.media.edges'
      ];
      
      for(const path of paths) {
        try {
          const parts = path.split('.');
          let current = obj;
          for(const part of parts) {
            if(current === null || current === undefined) break;
            if(part.includes('[')) {
              const match = part.match(/(\w+)\[(\d+)\]/);
              current = current[match[1]]?.[parseInt(match[2])];
            } else {
              current = current[part];
            }
          }
          if(current && Array.isArray(current)) {
            return current.map(e => e?.node?.shortcode).filter(Boolean);
          }
        } catch(e) {}
      }
      return [];
    };
    
    shortcodes = extractFrom(jsonData);
    
    if(shortcodes.length === 0) {
      // Last resort: Try to extract shortcodes from HTML directly
      const codeMatches = html.match(/instagram\.com\/p\/([\w-]+)/g);
      if(codeMatches) {
        const codes = new Set();
        codeMatches.forEach(m => {
          const c = m.match(/\/p\/([\w-]+)/);
          if(c) codes.add(c[1]);
        });
        shortcodes = [...codes].slice(0, 30); // Max 30
      }
    }
    
    if(shortcodes.length === 0) {
      throw new Error('No posts found in this profile');
    }
    
    // Remove duplicates
    shortcodes = [...new Set(shortcodes)];
    
    document.getElementById('loadStatus').textContent = `Found ${shortcodes.length} posts, fetching details...`;
    
    // Step 4: For each post, get oEmbed data to find which are videos
    const allPosts = [];
    const videoPosts = [];
    
    for(let i = 0; i < shortcodes.length; i++) {
      const code = shortcodes[i];
      document.getElementById('loadStatus').textContent = `Loading post ${i+1}/${shortcodes.length}...`;
      
      try {
        const oembedUrl = `https://api.instagram.com/oembed?url=https://www.instagram.com/p/${code}/&omitscript=true`;
        
        const oembedRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(oembedUrl)}`);
        
        if(oembedRes.ok) {
          const oembedData = await oembedRes.json();
          let oembedJson;
          try {
            oembedJson = JSON.parse(oembedData.contents);
          } catch(e) {
            oembedJson = typeof oembedData.contents === 'object' ? oembedData.contents : JSON.parse(oembedData.contents);
          }
          
          const post = {
            id: code,
            shortcode: code,
            title: oembedJson.title || `Instagram Post by ${INSTAGRAM_USERNAME}`,
            thumbnail: oembedJson.thumbnail_url || '',
            authorName: oembedJson.author_name || INSTAGRAM_USERNAME,
            authorUrl: oembedJson.author_url || '',
            html: oembedJson.html || '',
            url: `https://www.instagram.com/p/${code}/`,
            platform: 'instagram',
            category: 'Entertainment',
            views: 0,
            duration: '0:15',
            timestamp: new Date().toISOString()
          };
          
          allPosts.push(post);
          
          // Check if it's a video — oEmbed gives thumbnail_url for images too
          // We try to detect video by fetching the actual page
          const isVideo = await checkIfVideo(code);
          if(isVideo) {
            post.isVideo = true;
            videoPosts.push(post);
          }
        }
      } catch(e) {
        console.log('Error fetching post', code, e.message);
      }
      
      // Little delay to avoid rate limiting
      await new Promise(r => setTimeout(r, 300));
    }
    
    if(videoPosts.length === 0) {
      // If we couldn't detect videos, just show all posts as videos
      videoPosts.push(...allPosts);
    }
    
    posts = allPosts;
    videos = videoPosts;
    
    // Save to localStorage
    localStorage.setItem('zaraso_feed', JSON.stringify({posts, videos, savedAt: Date.now()}));
    
    renderProfile();
    renderGrid(videos);
    
    document.getElementById('loadStatus').textContent = `Loaded ${videoPosts.length} videos!`;
    setTimeout(() => {
      document.getElementById('loadStatus').textContent = 'Click any video to watch';
    }, 2000);
    
  } catch(err) {
    console.error('Fetch error:', err);
    
    // Try fallback: Use a different proxy
    try {
      await fallbackFetch();
      return;
    } catch(e2) {
      document.getElementById('videoGrid').innerHTML = `
        <div class="empty-state">
          <i class="fab fa-instagram" style="color:#e4405f;font-size:48px"></i>
          <h3>Could not load videos</h3>
          <p style="font-size:13px;color:#999;margin:8px 0">${err.message}</p>
          <p style="font-size:12px;color:#bbb">Try again later or check the username</p>
          <button class="refresh-btn" style="margin-top:16px" onclick="fetchFeed()">
            <i class="fas fa-redo"></i> Try Again
          </button>
        </div>`;
    }
  } finally {
    hideLoading();
    document.getElementById('refreshBtn').disabled = false;
  }
}

// ═══ Fallback: Try different proxy ═══
async function fallbackFetch() {
  document.getElementById('loadStatus').textContent = 'Trying alternative method...';
  
  // Get the oembed for the profile itself (won't give all posts but gives profile info)
  const profileOembed = `https://api.instagram.com/oembed?url=https://www.instagram.com/${INSTAGRAM_USERNAME}/&omitscript=true`;
  
  const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(profileOembed)}`);
  const data = await res.json();
  
  let json;
  try {
    json = JSON.parse(data.contents);
  } catch(e) {
    json = typeof data.contents === 'object' ? data.contents : JSON.parse(data.contents);
  }
  
  // We at least have profile info
  videos = [{
    id: 'profile',
    shortcode: '',
    title: `${json.author_name || INSTAGRAM_USERNAME} - Instagram Profile`,
    thumbnail: json.thumbnail_url || '',
    authorName: json.author_name || INSTAGRAM_USERNAME,
    html: json.html || '',
    url: `https://www.instagram.com/${INSTAGRAM_USERNAME}/`,
    platform: 'instagram',
    category: 'Entertainment',
    views: 0,
    isVideo: true,
    duration: '0:30',
    timestamp: new Date().toISOString()
  }];
  
  renderGrid(videos);
  throw new Error('Limited data - could only get profile info');
}

// ═══ Check if a post is a video ═══
async function checkIfVideo(shortcode) {
  try {
    // Method: Fetch the Instagram embed HTML and check for video tags
    const postUrl = `https://www.instagram.com/p/${shortcode}/embed/captioned/`;
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(postUrl)}`);
    
    if(res.ok) {
      const data = await res.json();
      const html = typeof data.contents === 'string' ? data.contents : JSON.stringify(data.contents);
      return html.includes('<video') || html.includes('video_url') || html.includes('"is_video":true');
    }
    return true; // If can't check, assume it's a video
  } catch(e) {
    return true;
  }
}

// ═══ Render Profile ═══
function renderProfile() {
  const name = `@${INSTAGRAM_USERNAME}`;
  document.getElementById('navName').textContent = name;
  document.getElementById('fullName').textContent = `@${INSTAGRAM_USERNAME}`;
  document.getElementById('videoCount').textContent = videos.length;
  document.getElementById('videoCountLabel').textContent = `(${videos.length} videos)`;
  
  const totalViews = videos.reduce((sum, v) => sum + (v.views || 0), 0);
  document.getElementById('totalViews').textContent = formatNum(totalViews);
}

// ═══ Render Grid ═══
function renderGrid(list) {
  const grid = document.getElementById('videoGrid');
  
  if(list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <i class="fas fa-video-slash"></i>
      <h3>No videos found</h3>
      <p>This account may have no videos</p>
    </div>`;
    return;
  }
  
  grid.innerHTML = list.map(v => {
    const thumb = v.thumbnail || 'https://via.placeholder.com/480x270/f5f5f5/ccc?text=Instagram';
    return `<div class="video-card" onclick="openVideo('${v.id}')">
      <div class="thumb" style="background-image:url('${thumb}')">
        <div class="play-overlay"><div class="play-circle"><i class="fas fa-play"></i></div></div>
        ${v.duration ? `<span class="duration">${v.duration}</span>` : ''}
      </div>
      <div class="info">
        <h3>${v.title || 'Instagram Video'}</h3>
        <div class="meta">
          <span><i class="fas fa-eye"></i> ${formatNum(v.views||0)}</span>
          <span><i class="fab fa-instagram" style="color:#e4405f"></i> Instagram</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══ Open Video (full page embed) ═══
function openVideo(id) {
  const v = videos.find(x => x.id === id);
  if(!v) return;
  
  // Update view count
  v.views = (v.views||0) + 1;
  localStorage.setItem('zaraso_feed', JSON.stringify({posts, videos, savedAt: Date.now()}));
  
  // Show watch page
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('profileHeader').style.display = 'none';
  document.getElementById('watchPage').classList.add('active');
  
  document.getElementById('watchTitle').textContent = v.title || 'Instagram Video';
  document.getElementById('watchMeta').innerHTML = `
    <span><i class="fas fa-eye"></i> ${formatNum(v.views)} views</span>
    <span><i class="fab fa-instagram" style="color:#e4405f"></i> Instagram</span>
    <span><i class="fas fa-user"></i> ${v.authorName || INSTAGRAM_USERNAME}</span>
  `;
  
  // Set video player — if we have direct video URL use it, otherwise use embed
  const player = document.getElementById('player');
  
  if(v.streamUrl) {
    player.src = v.streamUrl;
    player.load();
  } else {
    // No direct URL — show the Instagram embed page in an iframe-like way
    // We just show the embed HTML
    player.style.display = 'none';
    document.getElementById('videoPlayerWrap').innerHTML = `
      <div style="width:100%;max-height:80vh;background:#000;display:flex;align-items:center;justify-content:center;padding:40px 20px;min-height:400px;">
        <div style="max-width:500px;width:100%;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)">
          <div style="padding:20px;text-align:center;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff">
            <i class="fab fa-instagram" style="font-size:48px;margin-bottom:10px;display:block"></i>
            <h3 style="font-weight:700">Instagram Video</h3>
            <p style="font-size:13px;opacity:.9;margin-top:4px">${v.title || 'Instagram Video'}</p>
          </div>
          <div style="padding:30px;text-align:center">
            <p style="color:#888;margin-bottom:16px;font-size:14px">Watch on Instagram</p>
            <a href="${v.url}" target="_blank" rel="noopener noreferrer" 
               style="display:inline-flex;align-items:center;gap:8px;padding:12px 28px;
                      background:linear-gradient(135deg,#833ab4,#fd1d1d,#e95950);color:#fff;
                      border-radius:24px;text-decoration:none;font-size:14px;font-weight:600;
                      transition:.3s">
              <i class="fab fa-instagram"></i> Open in Instagram
            </a>
            <p style="margin-top:20px;font-size:12px;color:#bbb">
              <i class="fas fa-info-circle"></i> 
              Video embedded from Instagram via oEmbed
            </p>
          </div>
        </div>
      </div>`;
  }
  
  // Related videos
  const related = videos.filter(x => x.id !== id).slice(0,6);
  document.getElementById('relatedGrid').innerHTML = related.length > 0
    ? related.map(r => {
        const rt = r.thumbnail || 'https://via.placeholder.com/480x270/f5f5f5/ccc';
        return `<div class="related-card" onclick="openVideo('${r.id}')">
          <div class="thumb" style="background-image:url('${rt}')"></div>
          <div class="info"><h3>${r.title || 'Video'}</h3></div>
        </div>`;
      }).join('')
    : '<p style="color:#aaa;font-size:13px">No more videos</p>';
  
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ═══ Close Watch ═══
function closeWatch() {
  const player = document.getElementById('player');
  player.pause();
  player.src = '';
  player.style.display = '';
  document.getElementById('videoPlayerWrap').innerHTML = '';
  document.getElementById('watchPage').classList.remove('active');
  document.getElementById('homePage').style.display = '';
  document.getElementById('profileHeader').style.display = '';
  renderProfile();
}

function showHome() { closeWatch(); }

// ═══ Helpers ═══
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'Loading...';
  document.getElementById('loadingScreen').classList.add('active');
}
function hideLoading() {
  document.getElementById('loadingScreen').classList.remove('active');
}
function formatNum(n) {
  if(!n) return '0';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return n;
}
</script>
