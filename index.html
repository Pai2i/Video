body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;padding-top:70px}

/* ─── NAVBAR ─── */
.navbar{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);z-index:1000;padding:0 24px;height:65px;display:flex;align-items:center;justify-content:space-between;transition:.3s}
.navbar.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.06)}
.logo{font-size:22px;font-weight:800;text-decoration:none;display:flex;align-items:center;gap:8px}
.logo span{background:linear-gradient(135deg,#e53935,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 18px;border-radius:10px;text-decoration:none;color:#555;font-size:14px;font-weight:500;transition:all .3s ease;position:relative}
.nav-links a:hover{color:#e53935;background:rgba(229,57,53,.06)}
.nav-links a.active{color:#e53935;background:rgba(229,57,53,.1)}
.nav-links a i{margin-right:6px}
.search-box{display:flex;align-items:center;background:#f5f5f5;border-radius:24px;padding:0 16px;border:1px solid transparent;transition:all .3s ease;max-width:380px;width:100%}
.search-box:focus-within{border-color:#e53935;background:#fff;box-shadow:0 0 0 4px rgba(229,57,53,.08)}
.search-box input{background:transparent;border:none;padding:10px 12px;font-size:14px;outline:none;width:100%;color:#333}
.search-box button{background:none;border:none;color:#999;cursor:pointer;font-size:15px;transition:.3s;padding:8px 0}
.search-box button:hover{color:#e53935}

/* ─── CATEGORIES ─── */
.categories-bar{background:#fff;padding:14px 24px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;gap:8px;overflow-x:auto;position:sticky;top:65px;z-index:100}
.categories-bar::-webkit-scrollbar{height:0}
.cat-btn{padding:7px 18px;border-radius:20px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .3s ease;white-space:nowrap;background:#f5f5f5;color:#555;font-family:inherit}
.cat-btn:hover{background:#eee;transform:translateY(-1px)}
.cat-btn.active{background:#e53935;color:#fff;box-shadow:0 4px 12px rgba(229,57,53,.25)}

/* ─── CONTAINER ─── */
.container{max-width:1300px;margin:0 auto;padding:0 24px}

/* ─── HERO ─── */
.hero{background:linear-gradient(135deg,#fff5f5,#fff0f0,#fff);padding:40px 24px;text-align:center;border-bottom:1px solid rgba(0,0,0,.04)}
.hero h1{font-size:36px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#1a1a1a,#e53935);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:#777;font-size:16px;max-width:500px;margin:0 auto;line-height:1.6}

/* ─── VIDEO GRID ─── */
.featured{padding:30px 0}
.section-title{font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;color:#1a1a1a}
.section-title i{color:#e53935}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}

.video-card{background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.25,.46,.45,.94);border:1px solid rgba(0,0,0,.06);position:relative}
.video-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,.1);border-color:rgba(229,57,53,.15)}
.video-card:hover .thumb::after{opacity:1}
.video-card:hover .play-circle{transform:translate(-50%,-50%) scale(1.1);opacity:1}
.thumb{width:100%;aspect-ratio:16/9;background-size:cover;background-position:center;position:relative;overflow:hidden}
.thumb::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);opacity:0;transition:.4s}
.play-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;background:#e53935;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:.85;transition:all .4s cubic-bezier(.25,.46,.45,.94);box-shadow:0 4px 20px rgba(229,57,53,.4)}
.play-circle i{color:#fff;font-size:20px;margin-left:3px}
.thumb .duration{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.75);color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.thumb .source-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;padding:4px 10px;border-radius:6px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:5px;opacity:0;transition:.3s}
.video-card:hover .source-badge{opacity:0}
.info{padding:14px}
.info h3{font-size:14px;font-weight:600;color:#1a1a1a;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;transition:.3s}
.video-card:hover .info h3{color:#e53935}
.meta{display:flex;align-items:center;gap:14px;margin-top:8px;font-size:12px;color:#999;flex-wrap:wrap}
.meta span{display:flex;align-items:center;gap:4px}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px;animation:fadeIn .3s ease}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:#fff;border-radius:20px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;animation:slideUp .4s cubic-bezier(.25,.46,.45,.94);box-shadow:0 40px 100px rgba(0,0,0,.3)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:20px;cursor:pointer;transition:.3s;z-index:10;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e53935;transform:rotate(90deg)}
.modal-player{position:relative;background:#000;border-radius:20px 20px 0 0;overflow:hidden}
.modal-player video{width:100%;max-height:65vh;display:block;background:#000;cursor:pointer}
.modal-meta{padding:24px}
.modal-meta h2{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:12px}
.modal-info{display:flex;gap:20px;font-size:13px;color:#888;flex-wrap:wrap}
.modal-info span{display:flex;align-items:center;gap:5px}

/* ─── UPLOAD ─── */
.upload-area{background:#fff;border:2px dashed #ddd;border-radius:16px;padding:50px 30px;text-align:center;transition:all .4s ease}
.upload-area:hover{border-color:#e53935;background:#fff5f5}
.upload-area i{font-size:48px;color:#e53935;margin-bottom:15px;display:block}
.upload-area h3{font-size:18px;margin-bottom:8px;color:#1a1a1a}
.upload-area p{color:#888;font-size:14px;margin-bottom:20px}
.url-input-group{display:flex;gap:10px;max-width:600px;margin:0 auto;flex-wrap:wrap;justify-content:center}
.url-input-group input{flex:1;min-width:250px;padding:14px 18px;border:2px solid #e0e0e0;border-radius:12px;font-size:14px;outline:none;transition:.3s;font-family:inherit}
.url-input-group input:focus{border-color:#e53935;box-shadow:0 0 0 4px rgba(229,57,53,.08)}
.btn-primary{padding:14px 28px;background:#e53935;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s ease;font-family:inherit;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:#c62828;transform:translateY(-2px);box-shadow:0 8px 25px rgba(229,57,53,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.platform-tags span{display:flex;align-items:center;gap:5px;font-size:13px;color:#888;padding:6px 14px;border-radius:8px;background:#f9f9f9}

/* ─── ALERTS ─── */
.alert{padding:16px 20px;border-radius:12px;margin-bottom:20px;font-size:14px;display:flex;align-items:center;gap:10px;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.alert-success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.alert-error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.alert-success a{color:#2e7d32;font-weight:600}

/* ─── LOADING ─── */
.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:3000}
.loading-screen.active{display:flex}
.loading-bar{width:200px;height:3px;background:#f0f0f0;border-radius:10px;overflow:hidden;margin-top:20px}
.loading-bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#e53935,#ff6b6b);border-radius:10px;animation:loading 1.5s infinite ease}
@keyframes loading{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

@media(max-width:768px){
  .navbar{padding:0 16px}
  .nav-links a{padding:6px 12px;font-size:12px}
  .nav-links a span{display:none}
  .search-box{max-width:180px}
  .hero h1{font-size:26px}
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .info h3{font-size:13px}
  .modal-content{margin:10px}

// ──── STATE ────
let currentTab = 'home';
let activeCategory = 'All';
let videos = [];

// ──── INIT ────
document.addEventListener('DOMContentLoaded', () => {
  // Load or initialize videos
  const saved = localStorage.getItem('unistream_videos');
  if(saved) {
    videos = JSON.parse(saved);
    // Merge demo videos if not exists
    DEMO_VIDEOS.forEach(demo => {
      if(!videos.find(v => v.id === demo.id)) videos.push(demo);
    });
  } else {
    videos = [...DEMO_VIDEOS];
  }
  localStorage.setItem('unistream_videos', JSON.stringify(videos));
  
  loadCategories();
  renderHome();
  
  // Scroll effect
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
  });
});

// ──── CATEGORIES ────
function loadCategories() {
  const cats = ['All','Entertainment','Music','Gaming','Education','Sports','News','Technology','Comedy'];
  const bar = document.getElementById('categoriesBar');
  bar.innerHTML = cats.map(c => 
    `<button class="cat-btn ${c==='All'?'active':''}" onclick="setCategory('${c}',this)">${c}</button>`
  ).join('');
}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(currentTab === 'home') renderHome();
  else if(currentTab === 'trending') renderTrending();
}

// ──── PAGE NAV ────
function showPage(page) {
  currentTab = page;
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  
  if(page === 'home') renderHome();
  else if(page === 'trending') renderTrending();
  else if(page === 'upload') renderUpload();
  
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ──── RENDER HOME ────
function renderHome() {
  const title = document.getElementById('sectionTitle');
  title.innerHTML = '<i class="fas fa-star"></i> Latest Videos';
  
  const filtered = activeCategory === 'All' ? videos : videos.filter(v => v.category === activeCategory);
  renderGrid(filtered.slice(0, 30));
}

// ──── RENDER TRENDING ────
function renderTrending() {
  const title = document.getElementById('sectionTitle');
  title.innerHTML = '<i class="fas fa-fire"></i> Trending Videos';
  
  const sorted = [...videos].sort((a,b) => (b.views||0) - (a.views||0));
  const filtered = activeCategory === 'All' ? sorted : sorted.filter(v => v.category === activeCategory);
  renderGrid(filtered.slice(0, 30));
}

// ──── RENDER UPLOAD ────
function renderUpload() {
  const title = document.getElementById('sectionTitle');
  title.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Import Video';
  
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = `
    <div style="grid-column:1/-1;max-width:700px;margin:0 auto;width:100%;">
      <div class="upload-area">
        <i class="fas fa-link"></i>
        <h3>Import from Any Platform</h3>
        <p>Paste a YouTube, TikTok, Instagram or Facebook video URL below</p>
        <div id="alertBox"></div>
        <div class="url-input-group">
          <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
          <button onclick="importVideo()" id="importBtn" class="btn-primary">
            <i class="fas fa-download"></i> Import Now
          </button>
        </div>
        <div class="platform-tags">
          <span><i class="fab fa-youtube" style="color:#ff0000"></i> YouTube</span>
          <span><i class="fab fa-tiktok"></i> TikTok</span>
          <span><i class="fab fa-instagram" style="color:#e4405f"></i> Instagram</span>
          <span><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</span>
        </div>
      </div>
    </div>`;
}

// ──── RENDER GRID ────
function renderGrid(list) {
  const grid = document.getElementById('videoGrid');
  
  if(list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:#999;">
      <i class="fas fa-inbox" style="font-size:48px;margin-bottom:15px;display:block;color:#ddd"></i>
      <h3 style="color:#666;margin-bottom:8px">No videos found</h3>
      <p style="font-size:14px">Try a different category or <a href="#" onclick="showPage('upload')" style="color:#e53935;font-weight:600">import a video</a></p>
    </div>`;
    return;
  }
  
  grid.innerHTML = list.map(v => {
    const thumb = v.thumbnail || 'https://via.placeholder.com/480x270/f5f5f5/ccc?text=No+Thumbnail';
    const platIcons = {youtube:'fab fa-youtube', tiktok:'fab fa-tiktok', instagram:'fab fa-instagram', facebook:'fab fa-facebook'};
    const platColors = {youtube:'#ff0000', tiktok:'#000', instagram:'#e4405f', facebook:'#1877f2'};
    
    return `<div class="video-card" onclick="openVideo(${v.id})">
      <div class="thumb" style="background-image:url('${thumb}')">
        <div class="play-circle"><i class="fas fa-play"></i></div>
        ${v.duration ? `<span class="duration">${v.duration}</span>` : ''}
        <span class="source-badge"><i class="${platIcons[v.platform]||'fas fa-globe'}"></i> ${v.platform||'Web'}</span>
      </div>
      <div class="info">
        <h3>${v.title}</h3>
        <div class="meta">
          <span><i class="${platIcons[v.platform]||'fas fa-globe'}" style="color:${platColors[v.platform]||'#999'}"></i> ${v.platform||'Web'}</span>
          <span><i class="fas fa-eye"></i> ${formatViews(v.views||0)}</span>
          <span>${timeAgo(v.timestamp)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ──── OPEN VIDEO ────
function openVideo(id) {
  const v = videos.find(x => x.id === id);
  if(!v) return;
  
  // Increment views
  v.views = (v.views||0) + 1;
  const idx = videos.findIndex(x => x.id === id);
  videos[idx] = v;
  localStorage.setItem('unistream_videos', JSON.stringify(videos));
  
  // Build proxy URL
  const proxyUrl = v.videoUrl 
    ? `${WORKER_URL}/proxy/stream?url=${encodeURIComponent(v.videoUrl)}`
    : `${WORKER_URL}/proxy/stream?url=${encodeURIComponent('https://www.youtube.com/watch?v=dQw4w9WgXcQ')}`;
  
  document.getElementById('modalTitle').textContent = v.title;
  document.getElementById('modalInfo').innerHTML = `
    <span><i class="fas fa-eye"></i> ${formatViews(v.views)} views</span>
    <span><i class="fas fa-clock"></i> ${timeAgo(v.timestamp)}</span>
    <span><i class="fas fa-tag"></i> ${v.category || 'General'}</span>
    ${v.duration ? `<span><i class="fas fa-hourglass-half"></i> ${v.duration}</span>` : ''}
  `;
  
  const videoEl = document.getElementById('modalVideo');
  const source = videoEl.querySelector('source');
  source.src = proxyUrl;
  videoEl.load();
  
  document.getElementById('videoModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  
  // Prevent right-click on video
  videoEl.addEventListener('contextmenu', e => e.preventDefault());
}

function closeModal() {
  const videoEl = document.getElementById('modalVideo');
  videoEl.pause();
  videoEl.currentTime = 0;
  document.getElementById('videoModal').classList.remove('active');
  document.body.style.overflow = '';
}

// Close modal on overlay click
document.getElementById('videoModal').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

// ──── IMPORT VIDEO ────
function importVideo() {
  const url = document.getElementById('videoUrl').value.trim();
  const alertBox = document.getElementById('alertBox');
  
  if(!url) { showAlert('Please enter a video URL','error'); return; }
  
  const platform = detectPlatform(url);
  if(platform === 'other') { showAlert('⚠️ Only YouTube, TikTok, Instagram & Facebook URLs are supported','error'); return; }
  
  showLoading('Fetching video information...');
  document.getElementById('importBtn').disabled = true;
  document.getElementById('importBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Importing...';
  
  fetch(`${WORKER_URL}/fetch?url=${encodeURIComponent(url)}`)
    .then(r => {
      if(!r.ok) throw new Error('Proxy error: ' + r.status);
      return r.json();
    })
    .then(data => {
      hideLoading();
      document.getElementById('importBtn').disabled = false;
      document.getElementById('importBtn').innerHTML = '<i class="fas fa-download"></i> Import Now';
      
      const newVideo = {
        id: Date.now() + Math.floor(Math.random()*9999),
        title: data.title || 'Untitled Video',
        platform: platform,
        category: 'Entertainment',
        thumbnail: data.thumbnail || '',
        videoUrl: url,
        views: 0,
        duration: data.duration || '',
        timestamp: new Date().toISOString()
      };
      
      videos.unshift(newVideo);
      localStorage.setItem('unistream_videos', JSON.stringify(videos));
      
      document.getElementById('videoUrl').value = '';
      showAlert(`✅ Video imported successfully! <a href="#" onclick="showPage('home')">View on Home →</a>`, 'success');
    })
    .catch(err => {
      hideLoading();
      document.getElementById('importBtn').disabled = false;
      document.getElementById('importBtn').innerHTML = '<i class="fas fa-download"></i> Import Now';
      showAlert('Error: ' + err.message, 'error');
    });
}

// ──── SEARCH ────
function searchVideos(e) {
  e.preventDefault();
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if(!q) return;
  
  const results = videos.filter(v => v.title.toLowerCase().includes(q));
  
  document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-search"></i> Results: "${q}"`;
  
  if(results.length === 0) {
    document.getElementById('videoGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px;color:#999;">
      <i class="fas fa-search" style="font-size:40px;margin-bottom:15px;display:block;color:#ddd"></i>
      <h3 style="color:#666">No videos found for "${q}"</h3>
    </div>`;
    return;
  }
  
  renderGrid(results);
}

// ──── HELPERS ────
function detectPlatform(url) {
  if(/youtube\.com|youtu\.be|m\.youtube/i.test(url)) return 'youtube';
  if(/tiktok\.com|vm\.tiktok/i.test(url)) return 'tiktok';
  if(/instagram\.com|instagr\.am|cdninstagram/i.test(url)) return 'instagram';
  if(/facebook\.com|fb\.com|fb\.watch|fbsbx/i.test(url)) return 'facebook';
  return 'other';
}

function formatViews(v) {
  if(v >= 1000000) return (v/1000000).toFixed(1) + 'M';
  if(v >= 1000) return (v/1000).toFixed(1) + 'K';
  return v;
}

function timeAgo(t) {
  const diff = Date.now() - new Date(t).getTime();
  const secs = Math.floor(diff/1000);
  if(secs < 60) return secs + 's ago';
  const mins = Math.floor(secs/60);
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs/24);
  if(days < 30) return days + 'd ago';
  const months = Math.floor(days/30);
  return months + 'mo ago';
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  if(!box) return;
  box.innerHTML = `<div class="alert alert-${type}"><i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}</div>`;
  if(type==='success') setTimeout(() => box.innerHTML='', 6000);
}

function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'Loading...';
  document.getElementById('loadingScreen').classList.add('active');
}

function hideLoading() {
  document.getElementById('loadingScreen').classList.remove('active');
}
</script>
