<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UniStream - Watch Videos Free</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--text:#fff;--text2:#aaa;--accent:#ff4444}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:0 20px}

.navbar{background:var(--bg2);padding:12px 0;border-bottom:1px solid #333;position:sticky;top:0;z-index:100}
.navbar .container{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.logo{font-size:24px;font-weight:800;color:var(--accent);text-decoration:none;white-space:nowrap}
.nav-links{display:flex;gap:10px}
.nav-links a{color:var(--text2);text-decoration:none;font-size:14px;padding:8px 12px;border-radius:8px;transition:.3s}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:rgba(255,255,255,.1)}
.search-bar{display:flex;flex:1;min-width:200px;max-width:500px}
.search-bar input{flex:1;padding:10px 15px;border:1px solid #333;border-radius:20px 0 0 20px;background:var(--bg);color:var(--text);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar button{padding:10px 20px;background:var(--accent);border:none;border-radius:0 20px 20px 0;color:white;cursor:pointer}

.categories-bar{background:var(--bg2);padding:10px 0;border-bottom:1px solid #333;overflow-x:auto}
.categories-bar .container{display:flex;gap:8px;white-space:nowrap}
.category-tag{padding:8px 16px;background:#333;border-radius:20px;color:var(--text2);text-decoration:none;font-size:13px;transition:.3s;cursor:pointer}
.category-tag:hover{background:var(--accent);color:white}

.featured{padding:30px 0}
.featured h2{font-size:22px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.video-card{background:var(--bg3);border-radius:12px;overflow:hidden;transition:transform .3s}
.video-card:hover{transform:translateY(-5px)}
.thumb{width:100%;aspect-ratio:16/9;background-size:cover;background-position:center;position:relative;cursor:pointer}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:rgba(255,68,68,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:.3s;font-size:24px}
.video-card:hover .play-btn{opacity:1}
.info{padding:12px}
.info h3{font-size:14px;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.info h3 a{color:var(--text);text-decoration:none}
.meta{display:flex;gap:12px;font-size:12px;color:var(--text2);flex-wrap:wrap}

.upload-container{background:var(--bg2);padding:40px;border-radius:16px;text-align:center;margin:30px 0}
.upload-container h1{font-size:26px;margin-bottom:10px}
.subtitle{color:var(--text2);margin-bottom:25px}
.url-input-wrapper{display:flex;gap:10px;flex-wrap:wrap}
#videoUrl{flex:1;min-width:200px;padding:15px;border:2px solid #333;border-radius:12px;background:var(--bg);color:var(--text);font-size:15px;outline:none}
#videoUrl:focus{border-color:var(--accent)}
.btn-primary{padding:15px 30px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;white-space:nowrap}
.btn-primary:hover{background:#ff6666}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.supported-platforms{margin-top:25px;padding:15px;background:var(--bg);border-radius:12px}
.platform-icons{display:flex;justify-content:center;gap:20px;margin-top:10px;flex-wrap:wrap}
.platform-icons span{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:14px}

.alert{padding:15px;border-radius:10px;margin-bottom:20px;word-break:break-word}
.alert-success{background:rgba(0,200,83,.15);color:#00c853;border:1px solid rgba(0,200,83,.3)}
.alert-error{background:rgba(255,68,68,.15);color:#ff4444;border:1px solid rgba(255,68,68,.3)}

.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.spinner{width:50px;height:50px;border:4px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}

.watch-page{padding:20px 0}
.video-details{padding:20px 0}
.video-title{font-size:20px;margin-bottom:15px}
.video-actions{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;border-bottom:1px solid #333}
.video-stats{display:flex;gap:20px;color:var(--text2);font-size:14px;flex-wrap:wrap}
.platform-badge{padding:3px 12px;border-radius:20px;font-size:12px;background:#333}

.loading-text{grid-column:1/-1;text-align:center;padding:40px;color:#666}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.active{display:flex}
.modal-content{background:var(--bg2);border-radius:16px;padding:30px;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:15px;right:20px;font-size:28px;color:var(--text2);cursor:pointer;background:none;border:none}
.modal-close:hover{color:var(--text)}
.modal-player video{width:100%;max-height:65vh;background:#000;border-radius:12px;display:block}
.modal-meta{padding:20px 0 0}
.modal-meta h2{font-size:20px;margin-bottom:12px}
.modal-meta .info-row{display:flex;gap:20px;color:var(--text2);font-size:14px;flex-wrap:wrap}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="#" class="logo" onclick="showHome()">UniStream</a>
    <div class="nav-links">
      <a href="#" onclick="showHome()" id="navHome"><i class="fas fa-home"></i> Home</a>
      <a href="#" onclick="showTrending()" id="navTrending"><i class="fas fa-fire"></i> Trending</a>
      <a href="#" onclick="showUpload()" id="navUpload"><i class="fas fa-upload"></i> Upload</a>
    </div>
    <form class="search-bar" onsubmit="searchVideos(event)">
      <input type="text" id="searchInput" placeholder="Search videos..." required>
      <button type="submit"><i class="fas fa-search"></i></button>
    </form>
  </div>
</nav>

<div class="categories-bar">
  <div class="container" id="categories"></div>
</div>

<main class="container" id="mainContent">
  <section class="featured">
    <h2 id="sectionTitle"><i class="fas fa-star"></i> Latest Videos</h2>
    <div class="video-grid" id="videoGrid">
      <div class="loading-text"><i class="fas fa-spinner fa-spin"></i> Loading videos...</div>
    </div>
  </section>
</main>

<div class="modal-overlay" id="videoModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay" style="display:none;">
  <div class="spinner"></div>
  <p id="loadingText">Loading...</p>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — আপনার Cloudflare Worker URL এখানে বসান
// ═══════════════════════════════════════════════════
const WORKER_URL = 'https://your-worker.workers.dev';
// ═══════════════════════════════════════════════════

// ──── STATE ────
let currentView = 'home';
let allVideos = JSON.parse(localStorage.getItem('unistream_videos') || '[]');

// ──── INIT ────
document.addEventListener('DOMContentLoaded', () => {
  loadCategories();
  renderHome();
});

// ──── NAV ────
function showHome() { currentView='home'; renderHome(); updateNav('navHome'); }
function showTrending() { currentView='trending'; renderTrending(); updateNav('navTrending'); }
function showUpload() { currentView='upload'; renderUpload(); updateNav('navUpload'); }

function updateNav(id) {
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  if(id) document.getElementById(id).classList.add('active');
}

// ──── CATEGORIES ────
function loadCategories() {
  const cats = ['All','Entertainment','Music','Gaming','Education','Sports','News','Technology','Comedy'];
  const c = document.getElementById('categories');
  if(!c) return;
  c.innerHTML = cats.map(cat => `<span class="category-tag" onclick="filterCategory('${cat}')">${cat}</span>`).join('');
}

let activeFilter = 'All';
function filterCategory(cat) {
  activeFilter = cat;
  document.querySelectorAll('.category-tag').forEach(t => t.style.background = '');
  event.target.style.background = 'var(--accent)';
  event.target.style.color = 'white';
  if(currentView === 'trending') renderTrending();
  else renderHome();
}

// ──── RENDER: HOME ────
function renderHome() {
  document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-star"></i> Latest Videos`;
  const grid = document.getElementById('videoGrid');
  const vids = activeFilter === 'All' ? allVideos : allVideos.filter(v => v.category === activeFilter);
  
  if(vids.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#666;">
      <i class="fas fa-video" style="font-size:48px;margin-bottom:15px;display:block;"></i>
      <h3>No videos yet</h3>
      <p style="margin-top:10px;"><a href="#" onclick="showUpload()" style="color:#ff4444;">Import your first video →</a></p>
    </div>`;
    return;
  }
  grid.innerHTML = vids.slice(0,30).map(v => videoCard(v)).join('');
}

// ──── RENDER: TRENDING ────
function renderTrending() {
  document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-fire" style="color:#ff4444"></i> Trending Videos`;
  const grid = document.getElementById('videoGrid');
  const sorted = [...allVideos].sort((a,b) => (b.views||0)-(a.views||0));
  const vids = activeFilter === 'All' ? sorted : sorted.filter(v => v.category === activeFilter);
  
  if(vids.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#666;">
      <i class="fas fa-fire" style="font-size:48px;margin-bottom:15px;display:block;color:#ff4444;"></i>
      <h3>No trending videos</h3>
    </div>`;
    return;
  }
  grid.innerHTML = vids.slice(0,30).map(v => videoCard(v)).join('');
}

// ──── RENDER: UPLOAD ────
function renderUpload() {
  document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-upload"></i> Import Video`;
  document.getElementById('videoGrid').innerHTML = `
    <div style="grid-column:1/-1;">
      <div class="upload-container">
        <h1><i class="fas fa-cloud-upload-alt"></i> Import Video</h1>
        <p class="subtitle">Paste a link from YouTube, TikTok, Instagram, or Facebook</p>
        <div id="alertBox"></div>
        <div class="url-input-wrapper">
          <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
          <button onclick="importVideo()" id="importBtn" class="btn-primary"><i class="fas fa-download"></i> Import</button>
        </div>
        <div class="supported-platforms">
          <p><strong>Supported:</strong></p>
          <div class="platform-icons">
            <span><i class="fab fa-youtube" style="color:#ff0000"></i> YouTube</span>
            <span><i class="fab fa-tiktok"></i> TikTok</span>
            <span><i class="fab fa-instagram" style="color:#e4405f"></i> Instagram</span>
            <span><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</span>
          </div>
        </div>
      </div>
    </div>`;
}

// ──── VIDEO CARD ────
function videoCard(v) {
  const thumb = v.thumbnail && v.thumbnail.startsWith('http') 
    ? `${WORKER_URL}/thumb?url=${encodeURIComponent(v.thumbnail)}`
    : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="480" height="270" fill="%23333"><rect width="480" height="270"/><text x="50%" y="50%" fill="%23666" text-anchor="middle" dy=".3em" font-size="20">No Thumbnail</text></svg>';
  
  return `<div class="video-card" onclick="openVideo(${v.id})">
    <div class="thumb" style="background-image:url('${thumb}')"><div class="play-btn"><i class="fas fa-play"></i></div></div>
    <div class="info">
      <h3>${v.title}</h3>
      <div class="meta">
        <span>${v.category || v.platform || 'Video'}</span>
        <span><i class="fas fa-eye"></i> ${formatViews(v.views||0)}</span>
        <span>${timeAgo(v.timestamp)}</span>
      </div>
    </div>
  </div>`;
}

// ──── OPEN VIDEO MODAL ────
function openVideo(id) {
  const v = allVideos.find(x => x.id == id);
  if(!v) return;
  
  v.views = (v.views||0) + 1;
  const idx = allVideos.findIndex(x => x.id == id);
  allVideos[idx] = v;
  localStorage.setItem('unistream_videos', JSON.stringify(allVideos));
  
  const proxyUrl = v.embedUrl ? `${WORKER_URL}${v.embedUrl.startsWith('/') ? v.embedUrl : '/'+v.embedUrl}` : `${WORKER_URL}/proxy/youtube?url=${encodeURIComponent(v.sourceUrl||'')}`;
  const thumbSrc = v.thumbnail && v.thumbnail.startsWith('http') ? `${WORKER_URL}/thumb?url=${encodeURIComponent(v.thumbnail)}` : '';
  
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-player">
      <video id="modalVideo" controls autoplay style="width:100%;max-height:65vh;background:#000;border-radius:12px;">
        <source src="${proxyUrl}" type="video/mp4">
        <p style="color:#888;padding:40px;text-align:center;">Video source loading...<br>Your proxy may need configuration.</p>
      </video>
    </div>
    <div class="modal-meta">
      <h2>${v.title}</h2>
      <div class="info-row">
        <span><i class="fas fa-eye"></i> ${formatViews(v.views)} views</span>
        <span><i class="fas fa-clock"></i> ${timeAgo(v.timestamp)}</span>
        <span>${v.platform || ''}</span>
      </div>
    </div>`;
  
  document.getElementById('videoModal').classList.add('active');
  
  // Right-click prevent
  setTimeout(() => {
    const mv = document.getElementById('modalVideo');
    if(mv) mv.addEventListener('contextmenu', e => e.preventDefault());
  }, 100);
}

function closeModal() {
  const mv = document.getElementById('modalVideo');
  if(mv) mv.pause();
  document.getElementById('videoModal').classList.remove('active');
}

// ──── IMPORT VIDEO ────
function importVideo() {
  const url = document.getElementById('videoUrl').value.trim();
  const alertBox = document.getElementById('alertBox');
  
  if(!url) { showAlert('Please enter a video URL','error'); return; }
  
  const platform = detectPlatform(url);
  if(platform === 'other') { showAlert('Unsupported platform. Use YouTube, TikTok, Instagram or Facebook','error'); return; }
  
  showLoading('Fetching video...');
  document.getElementById('importBtn').disabled = true;
  document.getElementById('importBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Importing...';
  
  fetch(`${WORKER_URL}/fetch?url=${encodeURIComponent(url)}`)
    .then(r => {
      if(!r.ok) throw new Error('Proxy returned '+r.status);
      return r.json();
    })
    .then(data => {
      hideLoading();
      document.getElementById('importBtn').disabled = false;
      document.getElementById('importBtn').innerHTML = '<i class="fas fa-download"></i> Import';
      
      const newVideo = {
        id: Date.now() + Math.floor(Math.random()*1000),
        title: data.title || 'Untitled Video',
        platform: platform,
        category: 'Entertainment',
        thumbnail: data.thumbnail || '',
        embedUrl: data.embedUrl || '',
        views: 0,
        timestamp: new Date().toISOString(),
        sourceUrl: url
      };
      allVideos.unshift(newVideo);
      localStorage.setItem('unistream_videos', JSON.stringify(allVideos));
      
      document.getElementById('videoUrl').value = '';
      showAlert(`✅ Video imported! <a href="#" onclick="showHome()" style="color:#ff4444;">View on Home →</a>`, 'success');
    })
    .catch(err => {
      hideLoading();
      document.getElementById('importBtn').disabled = false;
      document.getElementById('importBtn').innerHTML = '<i class="fas fa-download"></i> Import';
      showAlert('Error: ' + err.message + '. Make sure your Worker is deployed.', 'error');
    });
}

// ──── SEARCH ────
function searchVideos(e) {
  e.preventDefault();
  const q = document.getElementById('searchInput').value.toLowerCase();
  const results = allVideos.filter(v => v.title.toLowerCase().includes(q));
  
  if(results.length === 0) {
    document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-search"></i> Search: "${q}"`;
    document.getElementById('videoGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#666;"><h3>No results</h3></div>`;
    return;
  }
  
  document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-search"></i> Results: "${q}" (${results.length})`;
  document.getElementById('videoGrid').innerHTML = results.map(v => videoCard(v)).join('');
}

// ──── HELPERS ────
function detectPlatform(url) {
  if(/youtube\.com|youtu\.be/i.test(url)) return 'youtube';
  if(/tiktok\.com/i.test(url)) return 'tiktok';
  if(/instagram\.com|instagr\.am/i.test(url)) return 'instagram';
  if(/facebook\.com|fb\.com|fb\.watch/i.test(url)) return 'facebook';
  return 'other';
}

function formatViews(v) {
  if(v>=1000000) return (v/1000000).toFixed(1)+'M';
  if(v>=1000) return (v/1000).toFixed(1)+'K';
  return v;
}

function timeAgo(t) {
  const diff = Date.now() - new Date(t).getTime();
  const secs = Math.floor(diff/1000);
  if(secs<60) return secs+'s ago';
  const mins = Math.floor(secs/60);
  if(mins<60) return mins+'m ago';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h ago';
  return Math.floor(hrs/24)+'d ago';
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  if(!box) return;
  const icon = type==='success' ? 'fa-check-circle' : 'fa-exclamation-circle';
  box.innerHTML = `<div class="alert alert-${type}"><i class="fas ${icon}"></i> ${msg}</div>`;
  if(type==='success') setTimeout(() => box.innerHTML='', 6000);
}

function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'Loading...';
  document.getElementById('loadingOverlay').style.display = 'flex';
}

function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ──── DELETE DEMO VIDEOS ────
// প্রথমবার ব্যবহারকারীর জন্য কিছু ডেমো ভিডিও যোগ করা
if(!localStorage.getItem('unistream_initialized')) {
  localStorage.setItem('unistream_initialized', 'true');
}
</script>
</body>
        </html>
